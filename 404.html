<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found | Lingesh N</title>
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#050505">
  
  <!-- Typography & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@0.395.0"></script>

  <style>
    :root {
      --bg: #050505;
      --primary: #ff4d5e;
      --primary-rgb: 255, 77, 94;
      --secondary: #ff7a85;
      --border: rgba(255, 255, 255, 0.08);
      --text: #ffffff;
      --muted: #bcbcbc;
      --display-font: 'Space Grotesk', sans-serif;
      --body-font: 'Plus Jakarta Sans', sans-serif;
      --mono-font: 'JetBrains Mono', monospace;
      --accent-glow: rgba(255, 77, 94, 0.35);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      background-color: var(--bg);
      color: var(--text);
      font-family: var(--body-font);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .blob-bg {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: -5;
      overflow: hidden;
      background: #050505;
      pointer-events: none;
    }

    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(160px);
      opacity: 0.12;
      animation: float 20s infinite alternate ease-in-out;
    }

    .blob-1 {
      top: 15%; left: 15%;
      width: 40vw; height: 40vw;
      background: var(--primary);
    }

    .blob-2 {
      bottom: 15%; right: 15%;
      width: 40vw; height: 40vw;
      background: var(--secondary);
      animation-delay: -5s;
    }

    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(3%, 5%) scale(1.05); }
    }

    .container {
      text-align: center;
      padding: 40px;
      max-width: 500px;
      background: rgba(15, 15, 16, 0.7);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
      z-index: 10;
    }

    .error-code {
      font-family: var(--mono-font);
      font-size: 72px;
      font-weight: 700;
      color: var(--primary);
      text-shadow: 0 0 20px var(--accent-glow);
      margin-bottom: 10px;
      letter-spacing: -0.05em;
    }

    h1 {
      font-family: var(--display-font);
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 16px;
      color: #fff;
    }

    p {
      color: var(--muted);
      line-height: 1.6;
      font-size: 15px;
      margin-bottom: 30px;
    }

    .btn {
      font-family: var(--mono-font);
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      padding: 12px 24px;
      border-radius: 8px;
      background: var(--text);
      color: var(--bg);
      border: 1px solid var(--text);
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .btn:hover {
      background: transparent;
      color: var(--text);
      border-color: var(--primary);
      box-shadow: 0 0 15px var(--accent-glow);
      transform: translateY(-2px);
    }

    :focus-visible {
      outline: 2px solid var(--primary);
      outline-offset: 4px;
    }
  </style>
</head>
<body>

  <div class="blob-bg">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
  </div>

  <div class="container">
    <div class="error-code">404</div>
    <h1>System Address Missing</h1>
    <p>The requested modules or resources could not be loaded into the core portfolio environment. Check the address syntax or return to the main workspace.</p>
    <a href="index.html" class="btn">
      <i data-lucide="arrow-left" aria-hidden="true"></i> Return Home
    </a>
  </div>

  <script>
    // Initialize Lucide Icons
    lucide.createIcons();
  </script>
</body>
</html>
